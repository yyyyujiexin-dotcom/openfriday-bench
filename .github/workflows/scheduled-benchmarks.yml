name: Scheduled Benchmarks

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      models:
        description: 'Comma-separated list of models (e.g., openrouter/anthropic/claude-sonnet-4)'
        required: false
        type: string
      suite:
        description: 'Task suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - automated-only
      upload:
        description: 'Upload results to leaderboard'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  # Build the Docker image with OpenClaw pre-installed
  build-image:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/benchmark-runner
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile.benchmark
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # Parse the model list into a matrix
  prepare-matrix:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set matrix from inputs or config file
        id: set-matrix
        env:
          # Pass user input via environment variable to prevent script injection
          INPUT_MODELS: ${{ inputs.models }}
        run: |
          if [ -n "$INPUT_MODELS" ]; then
            # Manual trigger with specific models - sanitize input
            # Only allow alphanumeric, slashes, hyphens, dots, and commas
            MODELS=$(echo "$INPUT_MODELS" | tr -cd 'a-zA-Z0-9/,.-')
          else
            # Scheduled run - read from config file
            MODELS=$(yq -r '.models | join(",")' .github/benchmark-models.yml)
          fi
          
          # Convert comma-separated list to JSON array
          JSON_ARRAY=$(echo "$MODELS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s -c .)
          echo "matrix={\"model\":$JSON_ARRAY}" >> $GITHUB_OUTPUT
          echo "Models to benchmark: $JSON_ARRAY"

  # Run benchmarks for each model
  benchmark:
    needs: [build-image, prepare-matrix]
    runs-on: blacksmith-16vcpu-ubuntu-2404
    # For self-hosted runners, change to:
    # runs-on: [self-hosted, benchmark]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    container:
      image: ghcr.io/${{ github.repository }}/benchmark-runner:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure OpenClaw
        env:
          BENCHMARK_MODEL: ${{ matrix.model }}
        run: |
          # Create minimal OpenClaw config for benchmarking
          # OpenClaw uses agents.defaults.model.primary, not defaultModel
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json << EOF
          {
            "agents": {
              "defaults": {
                "model": {
                  "primary": "$BENCHMARK_MODEL"
                },
                "workspace": "/tmp/pinchbench-workspace"
              }
            },
            "auth": {
              "profiles": {
                "openrouter:default": {
                  "provider": "openrouter",
                  "mode": "api_key"
                }
              }
            }
          }
          EOF
          
          # Create a minimal workspace for benchmarking - OpenClaw copies default
          # workspace files (AGENTS.md, SOUL.md, etc.) that tell the agent to
          # respond with NO_REPLY. We need to override those.
          mkdir -p /tmp/pinchbench-workspace
          cat > /tmp/pinchbench-workspace/AGENTS.md << 'AGENTS_EOF'
          # Benchmark Agent Instructions
          
          You are a benchmark agent being tested on various tasks.
          
          ## Rules
          1. Execute every task you are given to the best of your ability
          2. NEVER respond with NO_REPLY - always attempt the task
          3. Use available tools (read, write, exec, web_search, etc.) as needed
          4. Create any files requested in the task
          5. If you're unsure, make reasonable assumptions and proceed
          
          You will be evaluated on task completion. Do your best work.
          AGENTS_EOF

      - name: Run benchmark
        id: benchmark
        env:
          BENCHMARK_MODEL: ${{ matrix.model }}
          BENCHMARK_SUITE: ${{ inputs.suite || 'all' }}
          BENCHMARK_UPLOAD: ${{ inputs.upload }}
          # All models route through OpenRouter - single API key
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Pre-shared token for identifying GitHub Actions runs on leaderboard
          PINCHBENCH_TOKEN: ${{ secrets.PINCHBENCH_TOKEN }}
        run: |
          UPLOAD_FLAG=""
          if [ "$BENCHMARK_UPLOAD" = "false" ]; then
            UPLOAD_FLAG="--no-upload"
          fi
          
          ./scripts/run.sh \
            --model "$BENCHMARK_MODEL" \
            --suite "$BENCHMARK_SUITE" \
            --runs 1 \
            --output-dir results \
            $UPLOAD_FLAG
          
          # Find the results file and compute a hash for unique artifact naming
          RESULTS_FILE=$(ls -t results/*.json | head -1)
          echo "results_file=$RESULTS_FILE" >> $GITHUB_OUTPUT
          
          # Create artifact name - sanitize chars invalid for GitHub artifacts (: / etc)
          SAFE_MODEL=$(echo "$BENCHMARK_MODEL" | tr '/:' '--')
          echo "artifact_name=results-${SAFE_MODEL}-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.benchmark.outputs.artifact_name }}
          path: results/*.json
          retention-days: 90

      - name: Parse and display results
        if: always()
        env:
          RESULTS_FILE: ${{ steps.benchmark.outputs.results_file }}
          BENCHMARK_MODEL: ${{ matrix.model }}
        run: |
          if [ -f "$RESULTS_FILE" ]; then
            echo "## Benchmark Results: $BENCHMARK_MODEL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract key metrics
            jq -r '
              "| Metric | Value |",
              "|--------|-------|",
              "| Tasks Run | \(.tasks | length) |",
              "| Total Score | \([.tasks[].grading.mean] | add | . * 100 | round / 100) |",
              "| Max Score | \(.tasks | length) |",
              "| Run ID | \(.run_id) |"
            ' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
          fi

  # Aggregate results and notify
  summarize:
    needs: benchmark
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: results-*

      - name: Generate summary
        run: |
          echo "## PinchBench Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Model | Score | Tasks | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for dir in all-results/results-*; do
            if [ -d "$dir" ]; then
              for file in "$dir"/*.json; do
                if [ -f "$file" ]; then
                  jq -r '
                    "| \(.model) | \([.tasks[].grading.mean] | add | . * 100 | round / 100)/\(.tasks | length) | \(.tasks | length) | ✅ |"
                  ' "$file" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| (parse error) | - | - | ❌ |" >> $GITHUB_STEP_SUMMARY
                fi
              done
            fi
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::One or more benchmark runs failed. Check the job logs for details."
          # Add Slack/Discord notification here if desired
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"PinchBench run had failures"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
